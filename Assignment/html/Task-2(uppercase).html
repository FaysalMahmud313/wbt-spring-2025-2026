<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Username Uppercase Demo</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 20px;
            color: #222;
        }

        .section {
            background: #fff;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;

        }

        .section h2 {
            margin-top: 0;
        }


        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
        }

        span {
            color: red;
        }
    </style>
</head>


<body>


    <div class="section">

        <h2>Username Input</h2>

        <form id="usernameForm" novalidate>

            <div class="input-group">
                <label for="username">Username<span>*</span></label>
                <input type="text" id="username" placeholder="Enter your username">
            </div>

        </form>

    </div>

    </div>


    <script>

        const usernameInput = document.getElementById('username');


        usernameInput.addEventListener('input', function () {

            usernameInput.value = usernameInput.value.toUpperCase();

        });

    </script>

</body>

</html>
